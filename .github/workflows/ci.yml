name: ci

# Required status check that gates PR merges. Detects the solution file the
# claude-arch Submitter adds and runs its tests, mirroring the local sandbox.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Python solution tests
        if: hashFiles('solution.py') != ''
        run: |
          python -m pip install --quiet pytest
          # solution.py holds code + inline tests; widen collection like the adapter.
          python -m pytest -q -o python_files=*.py solution.py

      - name: Run JavaScript solution tests
        if: hashFiles('solution.js') != ''
        run: |
          # Make node --test discover the self-contained solution+tests file.
          cp solution.js solution.test.js
          node --test
